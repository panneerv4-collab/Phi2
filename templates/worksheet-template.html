<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PHIACADEMY Mathematics</title>

<style>

body {
    margin:0;
    padding:20px;
    background:#f7f7f7;
    font-family:"Comic Sans MS", "Segoe Print", cursive;
}

/* Notebook paper */
.worksheet {

    width:600px;
    max-width:95%;
    margin:auto;

    background:
    repeating-linear-gradient(
        white,
        white 34px,
        #d9eaff 35px
    );

    padding:35px;

    border-radius:15px;

    box-shadow:0 10px 30px rgba(0,0,0,0.15);

    position:relative;

}


/* Logo */

.logo {

    text-align:center;

}

.logo img {

    width:120px;

}


/* Header */

.chapter {

    text-align:center;

    color:#0066ff;

    font-size:32px;

    font-weight:bold;

    margin-top:20px;

}


/* Question */

.question-box {

    margin-top:30px;

    font-size:28px;

    color:#111;

    line-height:1.5;

}


/* Solution */

.solution-box {

    margin-top:30px;

    font-size:26px;

    color:red;

    line-height:1.5;

}


/* Footer */

.footer {

    margin-top:40px;

    text-align:center;

    font-size:20px;

    color:#333;

    font-weight:bold;

}


</style>

</head>


<body>


<div class="worksheet">


<div class="logo">

<img src="../assets/images/phiacademy-logo.png">

</div>



<div class="chapter">

Chapter: {{chapter}}

</div>



<div class="question-box">

<b>Question:</b>

<br><br>

{{question}}

</div>



<div class="solution-box">

<b>Solution:</b>

<br><br>

{{solution}}

</div>



<div class="footer">

Follow @phiacademy for more examples

</div>


</div>


</body>

</html>
